# docker-compose.yml
# Local development: Qdrant only (LLMs are hosted — Gemma via Google, NIM via NVIDIA)

services:
  qdrant:
    image: qdrant/qdrant:v1.16.1
    container_name: elden-ring-qdrant
    restart: unless-stopped

    # ── Graceful shutdown ──
    stop_signal: SIGTERM
    stop_grace_period: 120s

    ports:
      - "6333:6333"   # REST API + Web UI
      - "6334:6334"   # gRPC
    volumes:
      # IMPORTANT: use a Docker NAMED VOLUME, not a bind mount to the Windows
      # filesystem. Qdrant's gridstore uses memory-mapped I/O, which is
      # unreliable across the Docker-Desktop/WSL2 bind mount from Windows
      # (symptom: "Unrecognized filesystem" at startup + OutputTooSmall panics
      # on payload reads). A named volume lives inside the WSL2 ext4 filesystem
      # where mmap works correctly.
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
      - QDRANT__STORAGE__OPTIMIZERS__MAX_OPTIMIZATION_THREADS=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qdrant_storage:        # Docker-managed named volume (WSL2 ext4, mmap-safe)