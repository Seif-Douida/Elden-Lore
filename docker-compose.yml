# docker-compose.yml
# Local development: Qdrant only
# Production (GCP e2-micro): add ollama service here later

services:
  qdrant:
    image: qdrant/qdrant:v1.16.1
    container_name: elden-ring-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API + Web UI
      - "6334:6334"   # gRPC (used by qdrant-client for speed)
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
      # Uncomment to add API key protection (recommended before GCP deploy):
      # - QDRANT__SERVICE__API_KEY=your-secret-key-here
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s